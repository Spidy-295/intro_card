<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title> </title>
	
	<style>
	
  *{
      box-sizing: border-box;
      padding: 0;
      margin: 0;
  }

	.container{
	  width: 100%;
	  height: 100vh;
	  background: rgb(25,25,25);
	  display: flex;
	  flex-wrap: wrap;
	  align-items: center;
	  justify-content: center;
	  margin: auto;
	}
	
	.card{
	  width: 400px;
	  max-width: 80%;
	  height: 450px;
	  background: rgba(255,255,255,0.5);
	  text-align: center;
	  padding: 10px;
	  border-radius: 25px;
	  transition: 0.1;
	}
	
	.head{
	  text-align: left;
	  font-size: 60px;
	  padding-bottom: 20px;
	}
	
	img{
	  height: 220px;
	  width: 200px;
	  list-style-image: cover;
	}
	
	.text{
	  padding-top: 5px;
	}
	
	.para{
	  padding-top: 10px;
	}
	
	.card:hover{
	  background: rgba(0,0,0,0.4);
	  color: white;
	}
	
	.container:hover{
	  background: rgb(20,250,250);
	}

	</style>
	
</head>
<body>
    
    <div class="container">
      
      <div class="card">
        
        <h1 class="head">45</h1>
        
        <img src="rohit2.jpg">
        
        <h2 class="text">ROHIT SHARMA</h2>
        
        <p class="para"><b>INDIAN CAPTAIN 🧢:</b> phalaana falaana thikaana falaana thikaana phalaana falaana thikaana</p>
        
      </div>
      
    </div>
    
</body>
</html>
